<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#heroGradient)" stroke-width="2" opacity="0.3"/>

  <!-- Inner elegant circle -->
  <circle cx="100" cy="100" r="80" fill="url(#heroGradient)"/>

  <!-- Elegant A2 text -->
  <text x="50" y="125" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="white" letter-spacing="-4">A</text>
  <text x="105" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="400" fill="rgba(255,255,255,0.9)" letter-spacing="-2">2</text>

  <!-- Subtle accent dots -->
  <circle cx="40" cy="100" r="3" fill="url(#accentGradient)" opacity="0.6"/>
  <circle cx="160" cy="100" r="3" fill="url(#accentGradient)" opacity="0.6"/>
  <circle cx="100" cy="40" r="3" fill="url(#accentGradient)" opacity="0.6"/>
  <circle cx="100" cy="160" r="3" fill="url(#accentGradient)" opacity="0.6"/>
</svg>
